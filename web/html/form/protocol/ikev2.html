{{define "form/ikev2"}}
<a-form
    :colon="false"
    :label-col="{ md: {span:8} }"
    :wrapper-col="{ md: {span:14} }"
>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Auto-managed contiguous block (10.6.x). Grows automatically as
                    clients are added.
                </template>
                IP Range
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <template v-if="inbound.settings.ipRanges && inbound.settings.ipRanges.length">
            <a-input
                v-for="(r, i) in inbound.settings.ipRanges"
                :key="i"
                :value="r"
                read-only
                :style="{ marginBottom: '4px' }"
            ></a-input>
        </template>
        <span v-else :style="{ color: '#888' }">
            Assigned automatically on save
        </span>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    How clients authenticate. EAP-MSCHAPv2 uses each account's
                    username/password. PSK uses one shared secret for everyone.
                    EAP-TLS requires a client certificate per device.
                </template>
                Authentication Mode
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-select
            v-model="inbound.settings.authMode"
            :dropdown-class-name="themeSwitcher.currentTheme"
            :style="{ width: '100%', minWidth: '300px' }"
        >
            <a-select-option value="eap-mschapv2">EAP-MSCHAPv2 (username/password)</a-select-option>
            <a-select-option value="psk">PSK (shared secret)</a-select-option>
            <a-select-option value="eap-tls">Mutual certificate (EAP-TLS)</a-select-option>
        </a-select>
    </a-form-item>
    <a-alert
        v-if="inbound.settings.authMode === 'psk'"
        type="info"
        show-icon
        message="PSK uses one shared key for every device"
        description="Every device connects with the same pre-shared key below. This inbound still has one account that owns its routing, usage, quota, and User Limit; edit that account like any other client. Devices enter only the shared key, not a per-device username or password."
        :style="{ margin: '0 0 16px' }"
    ></a-alert>
    <a-form-item v-if="inbound.settings.authMode === 'psk'" label="Pre-Shared Key">
        <a-input-group compact>
            <a-input
                v-model.trim="inbound.settings.psk"
                :style="{ width: 'calc(100% - 90px)' }"
                placeholder="shared secret for all clients"
            ></a-input>
            <a-button :style="{ width: '90px' }" @click="generateIkev2Psk">Generate</a-button>
        </a-input-group>
    </a-form-item>
    <a-form-item label="Server Address (SAN)">
        <a-input
            v-model.trim="inbound.settings.serverAddr"
            placeholder="auto-detect server IP"
        ></a-input>
    </a-form-item>
    <a-form-item label="DNS 1">
        <a-input v-model.trim="inbound.settings.dns1" placeholder="8.8.8.8"></a-input>
    </a-form-item>
    <a-form-item label="DNS 2">
        <a-input v-model.trim="inbound.settings.dns2" placeholder="8.8.4.4"></a-input>
    </a-form-item>
    <a-form-item label="MTU">
        <a-input-number
            v-model.number="inbound.settings.mtu"
            :min="1200"
            :max="1500"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Simultaneous devices per account (each gets its own IP).
                    0 = no limit, 1 = single device, up to 64.
                </template>
                User Limit
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-input-number
            :value="inbound.settings.userLimit"
            @change="inbound.settings.userLimit = Math.max(0, Math.min(64, Math.floor($event || 0)))"
            :min="0" :max="64" :step="1" :precision="0" style="width: 90px"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    When an account is already at its device limit and another
                    device connects: reject the new one, or accept it and
                    disconnect that account's oldest device.
                </template>
                User Limit Strategy
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-radio-group v-model="inbound.settings.userLimitStrategy" button-style="solid">
            <a-radio-button value="accept">Accept</a-radio-button>
            <a-radio-button value="reject">Reject</a-radio-button>
        </a-radio-group>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Allow connected clients to reach each other
                </template>
                Client to Client
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.clientToClient"
            @change="val => { if (!val) inbound.settings.crossInbound = false }"
        ></a-switch>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Also reach clients of other inbounds (both inbounds must enable this)
                </template>
                Cross Inbound
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.crossInbound"
            :disabled="!inbound.settings.clientToClient"
        ></a-switch>
    </a-form-item>

    <template v-if="inbound.settings.authMode !== 'psk'">
        <a-divider>TLS Certificate</a-divider>
        <a-alert
            v-if="ikev2CertWarning"
            type="warning"
            show-icon
            :message="ikev2CertWarning"
            :style="{ margin: '0 0 12px' }"
        ></a-alert>
        <a-form-item label="Certificate Source">
            <a-radio-group v-model="inbound.settings.tlsUseFile" button-style="solid">
                <a-radio-button :value="true">Path</a-radio-button>
                <a-radio-button :value="false">Content</a-radio-button>
            </a-radio-group>
        </a-form-item>
        <template v-if="inbound.settings.tlsUseFile">
            <a-form-item label="Certificate Path">
                <a-input
                    v-model.trim="inbound.settings.certificateFile"
                    placeholder="/path/to/fullchain.pem"
                    @blur="ikev2CheckCert"
                >
                    <template slot="addonAfter">
                        <a-tooltip title="Use the panel's TLS certificate paths">
                            <a-icon type="import" @click="ikev2SetDefaultCert"></a-icon>
                        </a-tooltip>
                    </template>
                </a-input>
            </a-form-item>
            <a-form-item label="Key Path">
                <a-input
                    v-model.trim="inbound.settings.keyFile"
                    placeholder="/path/to/privkey.pem"
                ></a-input>
            </a-form-item>
        </template>
        <template v-else>
            <a-form-item label="Server Certificate">
                <a-textarea
                    v-model="inbound.settings.certificate"
                    :rows="3"
                    placeholder="-----BEGIN CERTIFICATE-----"
                    @blur="ikev2CheckCert"
                ></a-textarea>
            </a-form-item>
            <a-form-item label="Server Key">
                <a-textarea
                    v-model="inbound.settings.key"
                    :rows="3"
                    placeholder="-----BEGIN PRIVATE KEY-----"
                ></a-textarea>
            </a-form-item>
            <a-form-item :wrapper-col="{ md: {offset:8, span:14} }">
                <a-button type="primary" @click="generateIkev2Cert">
                    Generate Self-Signed Cert
                </a-button>
            </a-form-item>
        </template>
    </template>
</a-form>
{{end}}

{{define "component/sidebar/content"}}
<template>
    <nav class="bo-rail" :class="{ 'bo-rail--collapsed': collapsed }"
        aria-label='{{ i18n "menu.navigation"}}'>
        <div class="bo-rail-brand">
            <a href="{{ .base_path }}panel/" aria-label="{{ .brand }}">
                <img src="{{ .base_path }}assets/img/logo.png" alt="{{ .brand }}" />
            </a>
        </div>

        <div class="bo-rail-nav">
            <a v-for="tab in tabs" :key="tab.key" class="bo-rail-item"
                :class="{ 'is-active': isActive(tab.key) }" :href="tab.key"
                :aria-current="isActive(tab.key) ? 'page' : false"
                :title="collapsed ? tab.title : false"
                @click.prevent="openLink(tab.key)">
                <a-icon :type="tab.icon"></a-icon>
                <span v-text="tab.title"></span>
            </a>
        </div>

        <div class="bo-rail-foot">
            <a-theme-switch></a-theme-switch>
            <button type="button" class="bo-rail-collapse" @click="toggleCollapse"
                :aria-expanded="!collapsed" :aria-label="collapsed ? expandLabel : collapseLabel"
                :title="collapsed ? expandLabel : collapseLabel">
                <a-icon :type="collapsed ? 'right' : 'left'"></a-icon>
            </button>
        </div>
    </nav>
</template>
{{end}}

{{define "component/aSidebar"}}
<script>
    const SIDEBAR_COLLAPSED_KEY = "isSidebarCollapsed"

    Vue.component('a-sidebar', {
        data() {
            return {
                // Each tab is emitted only when the logged-in admin holds the
                // matching permission, so a section they cannot use never appears.
                // This is presentation only: the routes themselves are gated by
                // middleware, which is what actually enforces access.
                tabs: [
                    {
                        key: '{{ .base_path }}panel/',
                        icon: 'dashboard',
                        title: '{{ i18n "menu.dashboard"}}'
                    },
                    {{ if .perms.accessInbounds }}
                    {
                        key: '{{ .base_path }}panel/inbounds',
                        icon: 'user',
                        title: '{{ i18n "menu.inbounds"}}'
                    },
                    {{ end }}
                    {{ if .perms.accessPanelSettings }}
                    {
                        key: '{{ .base_path }}panel/settings',
                        icon: 'setting',
                        title: '{{ i18n "menu.settings"}}'
                    },
                    {{ end }}
                    {{ if .perms.accessXraySettings }}
                    {
                        key: '{{ .base_path }}panel/xray',
                        icon: 'tool',
                        title: '{{ i18n "menu.xray"}}'
                    },
                    {{ end }}
                    {{ if .perms.accessCoreSettings }}
                    {
                        key: '{{ .base_path }}panel/core',
                        icon: 'cluster',
                        title: '{{ i18n "menu.core"}}'
                    },
                    {{ end }}
                    {{ if .perms.superAdmin }}
                    {
                        key: '{{ .base_path }}panel/admins',
                        icon: 'team',
                        title: '{{ i18n "menu.admins"}}'
                    },
                    {{ end }}
                    {{ if .perms.superAdmin }}
                    {
                        key: '{{ .base_path }}panel/tunnel',
                        icon: 'deployment-unit',
                        title: '{{ i18n "menu.tunnel"}}'
                    },
                    {{ end }}
                    {
                        key: '{{ .base_path }}logout/',
                        icon: 'logout',
                        title: '{{ i18n "menu.logout"}}'
                    },
                ],
                requestUri: '{{ .request_uri }}',
                collapsed: JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY)) === true,
                collapseLabel: '{{ i18n "menu.collapse"}}',
                expandLabel: '{{ i18n "menu.expand"}}',
            }
        },
        methods: {
            // The active tab used to be handed to ant's a-menu as selected-keys.
            // With plain anchors we compare against the request URI ourselves.
            // Trailing slashes vary between the emitted keys and the served URI,
            // so both sides are normalised before comparing.
            isActive(key) {
                const norm = (s) => (s || '').replace(/\/+$/, '');
                return norm(key) === norm(this.requestUri);
            },
            openLink(key) {
                return key.startsWith('http') ?
                    window.open(key) :
                    location.href = key
            },
            toggleCollapse() {
                this.collapsed = !this.collapsed;
                localStorage.setItem(SIDEBAR_COLLAPSED_KEY, this.collapsed);
            },
        },
        template: `{{template "component/sidebar/content" .}}`,
    });
</script>
{{end}}
